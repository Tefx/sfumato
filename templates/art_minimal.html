<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 3840px;
    height: 2160px;
    overflow: hidden;
    color: #1a1a1a;
  }

  .bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: url('{{BG_IMAGE}}') center/cover no-repeat;
  }

  /* Bottom band overlay — art stays mostly visible */
  .band {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%;
    height: 680px;
    background: linear-gradient(
      to bottom,
      rgba(245,241,235,0) 0%,
      rgba(245,241,235,0.85) 15%,
      rgba(245,241,235,0.95) 30%,
      rgba(245,241,235,0.98) 100%
    );
  }

  .content {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%;
    height: 560px;
    padding: 0 120px 60px;
    display: flex;
    flex-direction: column;
    z-index: 1;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 36px;
    border-bottom: 2px solid rgba(0,0,0,0.12);
    padding-bottom: 20px;
  }

  .header .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 48px;
    font-weight: 900;
    color: #1a1a1a;
  }

  .header .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    color: #888;
  }

  .stories {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 40px;
    flex: 1;
  }

  .story {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .story .cat {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 18px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #c0392b;
  }

  .story .headline {
    font-family: 'Noto Serif SC', serif;
    font-size: 32px;
    font-weight: 700;
    line-height: 1.3;
    color: #1a1a1a;
  }

  .story .summary {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 22px;
    line-height: 1.55;
    color: #555;
    font-weight: 300;
  }

  .art-credit {
    position: absolute;
    top: 60px;
    right: 100px;
    font-family: 'Noto Serif SC', serif;
    font-style: italic;
    font-size: 24px;
    color: rgba(255,255,255,0.7);
    text-shadow: 0 1px 8px rgba(0,0,0,0.6);
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="band"></div>
  <div class="art-credit">{{ART_CREDIT}}</div>
  <div class="content">
    <div class="header">
      <div class="title">{{TITLE}}</div>
      <div class="meta">{{DATE}} · {{UPDATE_TIME}} 更新</div>
    </div>
    <div class="stories">
      {{STORIES}}
    </div>
  </div>
</body>
</html>
