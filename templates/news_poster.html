<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=3840, height=2160">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 3840px;
    height: 2160px;
    background: #0a0a0a;
    color: #e8e4df;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    display: flex;
  }

  .main {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: auto 1fr auto;
    gap: 0;
    width: 100%;
    height: 100%;
    padding: 80px 100px;
  }

  /* Header */
  .header {
    grid-column: 1 / -1;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 2px solid #333;
    padding-bottom: 40px;
    margin-bottom: 60px;
  }

  .header .title {
    font-family: 'Playfair Display', serif;
    font-size: 72px;
    font-weight: 900;
    letter-spacing: -1px;
    color: #f5f0eb;
  }

  .header .date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 32px;
    color: #666;
    font-weight: 400;
  }

  /* News columns */
  .column {
    padding: 0 40px;
    display: flex;
    flex-direction: column;
    gap: 50px;
  }

  .column:not(:last-child) {
    border-right: 1px solid #222;
  }

  .column:first-child { padding-left: 0; }
  .column:last-child { padding-right: 0; }

  .story {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .story .category {
    font-size: 22px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #b8860b;
  }

  .story .headline {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 700;
    line-height: 1.2;
    color: #f5f0eb;
  }

  .story .summary {
    font-size: 28px;
    line-height: 1.6;
    color: #999;
    font-weight: 300;
  }

  .story .source {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    color: #555;
  }

  .story.featured .headline {
    font-size: 56px;
  }

  .divider {
    width: 60px;
    height: 2px;
    background: #333;
  }

  /* Footer */
  .footer {
    grid-column: 1 / -1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid #222;
    padding-top: 30px;
    margin-top: 40px;
  }

  .footer .info {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    color: #444;
  }

  .weather {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .weather .temp {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    color: #f5f0eb;
  }

  .weather .condition {
    font-size: 26px;
    color: #666;
  }
</style>
</head>
<body>
<div class="main">
  <div class="header">
    <div class="title">{{TITLE}}</div>
    <div class="date">{{DATE}}</div>
  </div>

  {{COLUMNS}}

  <div class="footer">
    <div class="info">Updated {{UPDATE_TIME}} · Curated by Claude</div>
    <div class="weather">
      <span class="condition">{{WEATHER}}</span>
      <span class="temp">{{TEMP}}</span>
    </div>
  </div>
</div>
</body>
</html>
