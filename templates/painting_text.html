<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 3840px;
    height: 2160px;
    overflow: hidden;
    position: relative;
  }

  .painting {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: url('{{BG_IMAGE}}') center/cover no-repeat;
  }

  /* Localized scrim — gentle darkening only in text area, fades to transparent */
  .text-scrim {
    position: absolute;
    {{SCRIM_POSITION}}
    background: {{SCRIM_GRADIENT}};
    pointer-events: none;
    z-index: 1;
  }

  /* Text zone — positioned over the painting's quiet area */
  .text-zone {
    position: absolute;
    {{TEXT_POSITION}}
    max-width: {{TEXT_WIDTH}};
    z-index: 2;
  }

  .dateline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px;
    font-weight: 300;
    letter-spacing: 4px;
    color: {{TEXT_COLOR_DIM}};
    text-shadow: {{TEXT_SHADOW}};
    margin-bottom: 36px;
  }

  .news-block {
    margin-bottom: 44px;
  }

  .news-block .title {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 48px;
    font-weight: 700;
    line-height: 1.4;
    color: {{TEXT_COLOR}};
    text-shadow: {{TEXT_SHADOW}};
    margin-bottom: 12px;
  }

  .news-block .body {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 32px;
    font-weight: 300;
    line-height: 1.7;
    color: {{TEXT_COLOR_SEC}};
    text-shadow: {{TEXT_SHADOW}};
  }
</style>
</head>
<body>
  <div class="painting"></div>
  <div class="text-scrim"></div>
  <template id="whisper-contract">
    <div class="whisper-contract" data-whisper-position="{{WHISPER_POSITION}}" data-whisper-color="{{WHISPER_COLOR}}" data-whisper-shadow="{{WHISPER_SHADOW}}">{{WHISPER_TEXT}}</div>
  </template>
  <div class="text-zone">
    <div class="dateline">{{DATELINE}}</div>
    {{NEWS_BLOCKS}}
  </div>
</body>
</html>
