<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 3840px;
    height: 2160px;
    overflow: hidden;
    position: relative;
  }

  .painting {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: url('{{BG_IMAGE}}') center/cover no-repeat;
  }

  /* Text zone — positioned over the painting's quiet area */
  /* Scrim is integrated as background of text zone, auto-sizing with content */
  .text-zone {
    position: absolute;
    {{TEXT_POSITION}}
    max-width: {{TEXT_WIDTH}};
    z-index: 2;
    padding: 40px 48px;
    border-radius: 8px;
    background: {{SCRIM_GRADIENT}};
  }

  .dateline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px;
    font-weight: 300;
    letter-spacing: 4px;
    color: {{TEXT_COLOR_DIM}};
    text-shadow: {{TEXT_SHADOW}};
    margin-bottom: 36px;
  }

  .news-block {
    margin-bottom: 44px;
  }

  .news-block .title {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 48px;
    font-weight: 700;
    line-height: 1.4;
    color: {{TEXT_COLOR}};
    text-shadow: {{TEXT_SHADOW}};
    margin-bottom: 12px;
  }

  .news-block .body {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 32px;
    font-weight: 300;
    line-height: 1.7;
    color: {{TEXT_COLOR_SEC}};
    text-shadow: {{TEXT_SHADOW}};
  }

  /* Whisper zone — secondary editorial text */
  .whisper-zone {
    position: absolute;
    {{WHISPER_POSITION}}
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 28px;
    font-weight: 300;
    line-height: 1.6;
    color: {{WHISPER_COLOR}};
    text-shadow: {{WHISPER_SHADOW}};
    z-index: 3;
  }
</style>
</head>
<body>
  <div class="painting"></div>
  <template id="whisper-contract">
    <div class="whisper-contract" data-whisper-position="{{WHISPER_POSITION}}" data-whisper-color="{{WHISPER_COLOR}}" data-whisper-shadow="{{WHISPER_SHADOW}}">{{WHISPER_TEXT}}</div>
  </template>
  <div class="text-zone">
    <div class="dateline">{{DATELINE}}</div>
    {{NEWS_BLOCKS}}
  </div>
  <div class="whisper-zone">{{WHISPER_TEXT}}</div>
</body>
</html>
