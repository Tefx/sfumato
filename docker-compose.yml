name: sfumato

services:
  sfumato:
    build:
      context: .
      target: runtime
    image: sfumato:local
    container_name: sfumato
    restart: unless-stopped
    environment:
      SFUMATO_CONFIG: /data/config.toml
      SFUMATO_DATA_DIR: /data
      SFUMATO_HEALTH_MAX_AGE_SECONDS: 2100
      RIJKSMUSEUM_API_KEY: ${RIJKSMUSEUM_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    network_mode: host
    stop_signal: SIGTERM
    stop_grace_period: 90s
    healthcheck:
      test: ["CMD", "python", "/opt/sfumato/docker/healthcheck.py"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - type: bind
        source: ./data/config.toml
        target: /data/config.toml
      - type: bind
        source: ./data/paintings
        target: /data/paintings
      - type: bind
        source: ./data/state
        target: /data/state
      - type: bind
        source: ./data/output
        target: /data/output
